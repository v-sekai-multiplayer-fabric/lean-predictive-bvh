name: lake build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: lake-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Setup-only pass: install the toolchain, fetch the Mathlib cache, and
      # resolve+clone the full dependency graph by building a PURE-LEAN target
      # (`Shared`). Lake clones every manifest package during resolution, so
      # this materializes .lake/packages/LeanSlang without triggering its native
      # FFI (the slangShimO/extern_lib only builds when an exe is linked).
      #
      # This step must run BEFORE the Slang SDK is vendored: LeanSlang depends on
      # it being checked out, but we can't fetch the SDK until the package exists.
      - name: setup toolchain + cache + clone deps (pure-Lean Shared)
        uses: leanprover/lean-action@v1
        with:
          build-args: "Shared"
          test: false
          lint: false
          use-mathlib-cache: true

      # LeanSlang's main carries an in-process libslang FFI: ffi/slang_shim.cpp
      # `#include "slang.h"`, built into an extern_lib that Lake force-links into
      # any downstream executable (here, bvh-codegen). The Slang SDK is gitignored
      # in LeanSlang (see vendor/fetch.sh); fetch it before building the exe.
      - name: vendor the Slang SDK for LeanSlang's libslang FFI
        run: bash .lake/packages/LeanSlang/vendor/fetch.sh

      # Default target = the bvh-codegen exe per lakefile.lean. This is the
      # production-relevant signal: it's what writes predictive_bvh.h. Needs the
      # vendored SDK above to compile + link LeanSlang's slang_shim.
      - name: lake build (default target)
        run: lake build

      # Production gate: every module in each hexagon cluster's production
      # closure must typecheck. The repo was split into core/ports/adapters
      # clusters; each cluster lib is rooted at its aggregator (production tier
      # only, via `globs := #[.one ...]` in lakefile.lean).
      - name: lake build hexagon clusters (production gate)
        run: lake build Shared PredictiveBvh HumanoidRom FabricProtocol InterestManagement Rebac

      # Research-tier proofs (Research.lean): aspirational/model-level claims,
      # some currently broken against the pinned toolchain. Built for signal but
      # NOT gating, mirroring the previous PredictiveBVHResearch arrangement.
      - name: lake build Research (non-gating)
        continue-on-error: true
        run: lake build Research
